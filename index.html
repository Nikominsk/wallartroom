<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WallArtRoom</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #f7f7f7;
      color: #111;
    }
    .box {
      text-align: center;
      padding: 40px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 700px;
    }
    h1 { margin-bottom: 12px; }
    p { color: #555; }
  </style>
</head>
<body>
  <div class="box">
    <h1>WallArtRoom</h1>
    <p>Coming soon – preview art in your room</p>
  </div>
</body>
</html>
